<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" font-family="ui-monospace, Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="14">
  <style>
    .bg     { fill: #1e1e1e; }
    .chrome { fill: #2b2b2b; }
    .dot-r  { fill: #ff5f56; }
    .dot-y  { fill: #ffbd2e; }
    .dot-g  { fill: #27c93f; }
    .title  { fill: #999; font-size: 12px; }
    .text   { fill: #d0d0d0; }
    .dim    { fill: #888; }
    .prompt { fill: #5fafff; font-weight: 600; }
    .ok     { fill: #5fd75f; }
    .err    { fill: #ff5f5f; }
    .hdr    { fill: #cccccc; font-weight: 600; }
    .rule   { stroke: #444; stroke-width: 1; }
  </style>

  <!-- window -->
  <rect class="bg" width="820" height="360" rx="8" />
  <rect class="chrome" width="820" height="28" rx="8" />
  <rect class="chrome" y="20" width="820" height="8" />
  <circle class="dot-r" cx="16" cy="14" r="6" />
  <circle class="dot-y" cx="34" cy="14" r="6" />
  <circle class="dot-g" cx="52" cy="14" r="6" />
  <text class="title" x="410" y="18" text-anchor="middle">~/projects — gh runner-status</text>

  <!-- terminal content -->
  <g transform="translate(20, 56)">
    <!-- prompt + command -->
    <text class="prompt" x="0" y="0">$</text>
    <text class="text" x="14" y="0">gh runner-status</text>

    <!-- header -->
    <text class="hdr" x="0"   y="32">  REPO</text>
    <text class="hdr" x="200" y="32">NAME</text>
    <text class="hdr" x="370" y="32">STATUS</text>
    <text class="hdr" x="450" y="32">BUSY</text>
    <text class="hdr" x="500" y="32">LABELS</text>

    <!-- separator -->
    <line class="rule" x1="0" y1="42" x2="780" y2="42" />

    <!-- rows -->
    <text class="ok"   x="0"   y="64">✓</text>
    <text class="text" x="20"  y="64">acme-corp/api</text>
    <text class="text" x="200" y="64">runner-1</text>
    <text class="ok"   x="370" y="64">online</text>
    <text class="text" x="450" y="64">no</text>
    <text class="dim"  x="500" y="64">self-hosted, linux, x64</text>

    <text class="ok"   x="0"   y="84">✓</text>
    <text class="text" x="20"  y="84">acme-corp/api</text>
    <text class="text" x="200" y="84">runner-2</text>
    <text class="ok"   x="370" y="84">online</text>
    <text class="text" x="450" y="84">yes</text>
    <text class="dim"  x="500" y="84">self-hosted, linux, x64</text>

    <text class="err"  x="0"   y="104">✗</text>
    <text class="text" x="20"  y="104">acme-corp/web</text>
    <text class="text" x="200" y="104">runner-1</text>
    <text class="err"  x="370" y="104">offline</text>
    <text class="text" x="450" y="104">no</text>
    <text class="dim"  x="500" y="104">self-hosted, linux, x64</text>

    <text class="ok"   x="0"   y="124">✓</text>
    <text class="text" x="20"  y="124">acme-corp/data</text>
    <text class="text" x="200" y="124">runner-1</text>
    <text class="ok"   x="370" y="124">online</text>
    <text class="text" x="450" y="124">no</text>
    <text class="dim"  x="500" y="124">self-hosted, macOS, ARM64</text>

    <!-- next prompt with REPL example -->
    <text class="prompt" x="0" y="170">$</text>
    <text class="text" x="14" y="170">gh runner-status</text>
    <text class="dim"  x="0" y="194">▸ gh-runner-status v0.2.0</text>
    <text class="dim"  x="0" y="214">type /help for commands • Ctrl-D to exit</text>

    <text class="prompt" x="0"  y="244">❯</text>
    <text class="text"   x="16" y="244">restart actions.runner.acme-corp-web.runner-1</text>
    <text class="dim"    x="0"  y="264">restarted: actions.runner.acme-corp-web.runner-1</text>

    <text class="prompt" x="0"  y="290">❯</text>
    <text class="text"   x="16" y="290">/quit</text>
    <text class="dim"    x="0"  y="310">bye!</text>
  </g>
</svg>
