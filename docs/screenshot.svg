<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="ui-monospace, Menlo, Monaco, Consolas, 'Liberation Mono', monospace" font-size="13">
  <style>
    .bg     { fill: #1e1e1e; }
    .chrome { fill: #2b2b2b; }
    .dot-r  { fill: #ff5f56; }
    .dot-y  { fill: #ffbd2e; }
    .dot-g  { fill: #27c93f; }
    .title  { fill: #999; font-size: 12px; }
    .text   { fill: #d0d0d0; }
    .dim    { fill: #888; }
    .accent { fill: #5fafff; font-weight: 600; }
    .ok     { fill: #5fd75f; }
    .warn   { fill: #ffbd2e; }
    .err    { fill: #ff5f5f; }
    .hdr    { fill: #cccccc; font-weight: 600; }
    .rule   { stroke: #444; stroke-width: 1; }
  </style>

  <!-- window -->
  <rect class="bg" width="920" height="480" rx="8" />
  <rect class="chrome" width="920" height="28" rx="8" />
  <rect class="chrome" y="20" width="920" height="8" />
  <circle class="dot-r" cx="16" cy="14" r="6" />
  <circle class="dot-y" cx="34" cy="14" r="6" />
  <circle class="dot-g" cx="52" cy="14" r="6" />
  <text class="title" x="460" y="18" text-anchor="middle">~/projects — gh runner-status</text>

  <g transform="translate(20, 56)">
    <!-- banner -->
    <text class="accent" x="0" y="0">▸ gh-runner-status</text>
    <text class="dim" x="180" y="0">v0.4.0 • laptop • 14:32:01</text>

    <!-- header -->
    <text class="hdr" x="0"   y="34">  REPO</text>
    <text class="hdr" x="180" y="34">NAME</text>
    <text class="hdr" x="320" y="34">STATUS</text>
    <text class="hdr" x="395" y="34">BUSY</text>
    <text class="hdr" x="445" y="34">UPTIME</text>
    <text class="hdr" x="525" y="34">CPU</text>
    <text class="hdr" x="580" y="34">MEM</text>
    <text class="hdr" x="630" y="34">VERSION</text>
    <text class="hdr" x="715" y="34">LABELS</text>

    <line class="rule" x1="0" y1="44" x2="880" y2="44" />

    <!-- rows -->
    <text class="ok"   x="0"   y="68">✓</text>
    <text class="text" x="20"  y="68">acme-corp/api</text>
    <text class="text" x="180" y="68">runner-1</text>
    <text class="ok"   x="320" y="68">online</text>
    <text class="text" x="395" y="68">no</text>
    <text class="text" x="445" y="68">5d 2h</text>
    <text class="text" x="525" y="68">0.0%</text>
    <text class="text" x="580" y="68">53M</text>
    <text class="text" x="630" y="68">2.334.0</text>
    <text class="dim"  x="715" y="68">linux,x64</text>

    <text class="ok"   x="0"   y="88">✓</text>
    <text class="text" x="20"  y="88">acme-corp/api</text>
    <text class="text" x="180" y="88">runner-2</text>
    <text class="ok"   x="320" y="88">online</text>
    <text class="text" x="395" y="88">yes</text>
    <text class="text" x="445" y="88">5d 2h</text>
    <text class="warn" x="525" y="88">42.1%</text>
    <text class="warn" x="580" y="88">187M</text>
    <text class="text" x="630" y="88">2.334.0</text>
    <text class="dim"  x="715" y="88">linux,x64</text>

    <text class="err"  x="0"   y="108">✗</text>
    <text class="text" x="20"  y="108">acme-corp/web</text>
    <text class="text" x="180" y="108">runner-1</text>
    <text class="err"  x="320" y="108">offline</text>
    <text class="text" x="395" y="108">no</text>
    <text class="dim"  x="445" y="108">-</text>
    <text class="dim"  x="525" y="108">-</text>
    <text class="dim"  x="580" y="108">-</text>
    <text class="warn" x="630" y="108">2.333.1*</text>
    <text class="dim"  x="715" y="108">linux,x64</text>

    <text class="ok"   x="0"   y="128">✓</text>
    <text class="text" x="20"  y="128">acme-corp/data</text>
    <text class="text" x="180" y="128">runner-1</text>
    <text class="ok"   x="320" y="128">online</text>
    <text class="text" x="395" y="128">no</text>
    <text class="text" x="445" y="128">2d 4h</text>
    <text class="text" x="525" y="128">0.0%</text>
    <text class="text" x="580" y="128">45M</text>
    <text class="text" x="630" y="128">2.334.0</text>
    <text class="dim"  x="715" y="128">macOS,ARM64</text>

    <!-- footer with cache hint -->
    <text class="dim"  x="0"   y="160">  (data 7s old; auto-refresh in 23s, [r] to force)</text>

    <text class="dim"  x="0" y="194">─ refreshing every 30s •</text>
    <text class="text" x="170" y="194">[r]</text>
    <text class="dim"  x="190" y="194">efresh</text>
    <text class="text" x="245" y="194">[c]</text>
    <text class="dim"  x="265" y="194">ommand</text>
    <text class="text" x="320" y="194">[a]</text>
    <text class="dim"  x="340" y="194">dd</text>
    <text class="text" x="370" y="194">[h]</text>
    <text class="dim"  x="390" y="194">elp</text>
    <text class="text" x="425" y="194">[q]</text>
    <text class="dim"  x="445" y="194">uit</text>

    <!-- next prompt with command + result -->
    <text class="accent" x="0" y="240">❯</text>
    <text class="text" x="16" y="240">restart runner-1</text>

    <text class="dim" x="0" y="262">restarted: actions.runner.acme-corp-web.runner-1</text>

    <!-- doctor invocation -->
    <text class="accent" x="0" y="306">❯</text>
    <text class="text" x="16" y="306">doctor</text>
    <text class="dim" x="0" y="326">Health check (latest runner version: 2.334.0)</text>
    <text class="ok"   x="0"   y="350">  ✓</text>
    <text class="text" x="22"  y="350">actions.runner.acme-corp-api.runner-1</text>
    <text class="ok"   x="0"   y="368">  ✓</text>
    <text class="text" x="22"  y="368">actions.runner.acme-corp-api.runner-2</text>
    <text class="err"  x="0"   y="386">  ✗</text>
    <text class="text" x="22"  y="386">actions.runner.acme-corp-web.runner-1</text>
    <text class="dim"  x="60"  y="402">- not running</text>
    <text class="dim"  x="60"  y="418">- outdated (2.333.1, latest 2.334.0)</text>
    <text class="ok"   x="0"   y="440">  ✓</text>
    <text class="text" x="22"  y="440">actions.runner.acme-corp-data.runner-1</text>
  </g>
</svg>
