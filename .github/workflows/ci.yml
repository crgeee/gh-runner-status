name: CI

# Workflow does NOT consume any user-controlled inputs (no issue titles,
# PR bodies, commit messages, head_ref interpolation). Hardened against
# workflow-injection by construction — every `run:` block uses only
# trusted sources.

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' && github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: shellcheck gh-runner-status

  bash32-portability:
    name: Bash 3.2 portability lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Catch bash-4+ patterns that break on macOS default bash
        run: |
          set -e
          # Lines containing `bash4-ok` annotation are intentional uses
          # gated behind a bash-version check. Pure-comment lines are
          # ignored too. Scans every shipped bash entrypoint, not just
          # the main script — completions also need to work on bash 3.2.
          BASH_SOURCES=(
            gh-runner-status
            completions/gh-runner-status.bash
          )
          scan() {
            # grep -nH emits "path:lineno:content"; awk drops lines
            # where content (everything after the second `:`) is just
            # a comment. Bash4-ok annotated lines are also dropped.
            grep -nHE "$1" "${BASH_SOURCES[@]}" \
              | grep -v 'bash4-ok' \
              | awk -F: '{
                  s = $0
                  # strip path:lineno: prefix
                  sub(/^[^:]*:[0-9]+:/, "", s)
                  # skip whitespace then check first non-blank char
                  sub(/^[[:space:]]+/, "", s)
                  if (substr(s, 1, 1) != "#") print
                }' || true
          }
          fail=0
          out=$(scan 'read[[:space:]][^|;]*-t[[:space:]]+[0-9]+\.[0-9]')
          if [[ -n "$out" ]]; then
            echo "::error::Fractional 'read -t' timeouts are bash 4+ only — use _read_short_peek or an integer timeout. Add # bash4-ok if intentional."
            echo "$out"; fail=1
          fi
          out=$(scan '^[[:space:]]*(mapfile|readarray)[[:space:]]')
          if [[ -n "$out" ]]; then
            echo "::error::mapfile/readarray are bash 4+ only — use a while-read loop"
            echo "$out"; fail=1
          fi
          out=$(scan '\$\{[A-Za-z_][A-Za-z0-9_]*\^\^?\}|\$\{[A-Za-z_][A-Za-z0-9_]*,,?\}')
          if [[ -n "$out" ]]; then
            echo "::error::\${var^^} / \${var,,} case-conversion expansions are bash 4+ only — use tr or awk"
            echo "$out"; fail=1
          fi
          out=$(scan '^[[:space:]]*(declare|local)[[:space:]]+-[a-zA-Z]*n[a-zA-Z]*[[:space:]]')
          if [[ -n "$out" ]]; then
            echo "::error::declare/local -n namerefs are bash 4.3+ only — pass values explicitly"
            echo "$out"; fail=1
          fi
          out=$(scan 'read[[:space:]][^|;]*-i[[:space:]]')
          if [[ -n "$out" ]]; then
            echo "::error::'read -i' (initial buffer) is bash 4+ only — print prefix manually before read"
            echo "$out"; fail=1
          fi
          if [[ $fail -eq 0 ]]; then
            echo "✓ no bash-3.2-incompatible patterns found"
          else
            exit 1
          fi

  test:
    name: Tests (bats) on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install bats (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bats jq

      - name: Install bats (macOS)
        if: runner.os == 'macOS'
        run: brew install bats-core jq

      - name: Run bats suite
        run: bats tests/

      # macOS still ships /bin/bash 3.2 (frozen at GPLv2). Anyone who
      # installs this extension on a stock Mac without `brew install bash`
      # runs it under 3.2. Re-run the suite explicitly under that bash so
      # we catch bashisms (read -e -i, mapfile, namerefs, ${var^^}, etc.)
      # — shellcheck doesn't have version-specific lint.
      - name: Run bats under macOS system bash 3.2
        if: runner.os == 'macOS'
        run: |
          /bin/bash --version | head -1
          # Prepend /bin to PATH so the script's `#!/usr/bin/env bash`
          # shebang resolves to /bin/bash (3.2) instead of brew bash 5.x.
          # brew gh/jq stay reachable further down the PATH so the
          # script's `require gh` / `require jq` checks still pass.
          PATH="/bin:$PATH" bats tests/

  coverage:
    name: Coverage (kcov)
    runs-on: ubuntu-latest
    needs: test
    # kcov isn't in the default Ubuntu noble repos. Building from source
    # adds ~3 min to CI. Marked continue-on-error for now so the rest of
    # CI doesn't block on a flaky coverage step. The branch-protection
    # required-checks list does NOT include this job.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y bats jq cmake binutils-dev libcurl4-openssl-dev \
            libdw-dev libelf-dev libiberty-dev libssl-dev python3 zlib1g-dev

      - name: Build kcov from source
        run: |
          set -euo pipefail
          KCOV_VERSION="v43"
          curl -sSL "https://github.com/SimonKagstrom/kcov/archive/refs/tags/${KCOV_VERSION}.tar.gz" \
            | tar xz
          cd "kcov-${KCOV_VERSION#v}"
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release >/dev/null
          make -j"$(nproc)" >/dev/null
          sudo make install >/dev/null

      - name: Run bats under kcov
        run: |
          mkdir -p coverage
          kcov \
            --include-path="$(pwd)/gh-runner-status" \
            --bash-handle-sh-invocation \
            coverage \
            "$(command -v bats)" tests/

      - name: Upload coverage HTML as artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Upload to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v4
        with:
          files: coverage/bats/cobertura.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
