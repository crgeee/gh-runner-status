name: CI

# Workflow does NOT consume any user-controlled inputs (no issue titles,
# PR bodies, commit messages, head_ref interpolation). Hardened against
# workflow-injection by construction — every `run:` block uses only
# trusted sources.

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' && github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: shellcheck gh-runner-status

  test:
    name: Tests (bats) on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install bats (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bats jq

      - name: Install bats (macOS)
        if: runner.os == 'macOS'
        run: brew install bats-core jq

      - name: Run bats suite
        run: bats tests/

  coverage:
    name: Coverage (kcov)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install kcov + bats + jq
        run: |
          sudo apt-get update
          sudo apt-get install -y kcov bats jq

      - name: Run bats under kcov
        run: |
          mkdir -p coverage
          kcov \
            --include-path="$(pwd)/gh-runner-status" \
            --bash-handle-sh-invocation \
            coverage \
            "$(command -v bats)" tests/

      - name: Upload coverage HTML as artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Upload to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v4
        with:
          files: coverage/bats/cobertura.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
